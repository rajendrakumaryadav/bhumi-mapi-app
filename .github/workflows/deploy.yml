# .github/workflows/deploy.yml
#
# Builds the Vite site at the repo root and deploys dist/ to GitHub Pages.
# Deploys to:
#     https://rajendrakumaryadav.github.io/bhumi-mapi-app/
#
# ── What this workflow does ─────────────────────────────────────────────
#  1. Triggers on push to `main`, and on manual dispatch.
#  2. Installs deps (npm ci if a lockfile exists, else npm install).
#  3. Runs `npm run build`, which is:
#        vite build                    → emits dist/
#        scripts/postbuild.js          → writes dist/404.html (SPA
#                                        fallback, rafgraph redirect),
#                                        verifies base path, prints
#                                        diagnostics.
#  4. Dumps dist/ diagnostics so failures are easy to read in the log.
#  5. Uploads dist/ as a GitHub Pages artifact.
#  6. Deploys it to GitHub Pages.
#
# ── One-time setup ──────────────────────────────────────────────────────
#  In GitHub → Settings → Pages, set Source to "GitHub Actions".

name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy — that could leave the live site
# half-updated and broken.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Using 'npm ci' (lockfile present)"
            npm ci
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then
            echo "bun.lock present — installing with npm (works fine for Vite)"
            npm install
          else
            echo "No lockfile — using 'npm install'"
            npm install
          fi

      - name: Build (vite + postbuild)
        run: npm run build

      - name: Inspect dist/ for diagnostics
        run: |
          echo "::: dist/ contents :::"
          ls -la dist/
          echo
          echo "::: dist/404.html (head) :::"
          head -8 dist/404.html
          echo
          echo "::: base + asset paths from dist/index.html :::"
          grep -E '<base|<script[^>]*src=|<link[^>]*href=' dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # MUST be the *directory* that contains index.html and 404.html.
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
